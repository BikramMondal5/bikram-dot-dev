services:
  - type: web
    name: bikram-dot-dev-backend
    runtime: python
    rootDir: RAG
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
