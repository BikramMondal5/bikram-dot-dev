name: Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
      
      - name: Build Next.js
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          RAG_BACKEND_URL: ${{ secrets.RAG_BACKEND_URL }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: ./RAG
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Test RAG backend syntax
        working-directory: ./RAG
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/rag.py
          python -m py_compile app/ingest.py
